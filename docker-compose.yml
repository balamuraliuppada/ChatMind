services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: chatminds_user
      POSTGRES_PASSWORD: chatminds_password
      POSTGRES_DB: chatminds
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chatminds_user -d chatminds"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    environment:
      - DATABASE_URL=postgresql+asyncpg://chatminds_user:chatminds_password@db/chatminds
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=supersecretkey-change-in-production
      - CORS_ORIGINS=["http://localhost","http://localhost:5173","http://localhost:3000","http://localhost:8080"]
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      - backend

  nginx:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - frontend

volumes:
  postgres_data:
